<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签标签管理器 - 控制台</title>
  <link rel="stylesheet" href="manager.css">
</head>
<body>
  <div class="app-container">
    <!-- 1. 左侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="icons/icon48.png" alt="Logo" class="logo-img">
        <h1 class="logo-text">标签书签</h1>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-title">视图</span>
          <button id="nav-all" class="nav-item active">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <span>所有书签</span>
            <span id="count-all" class="badge">0</span>
          </button>
          <button id="nav-untagged" class="nav-item">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>未分类书签</span>
            <span id="count-untagged" class="badge">0</span>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-section-header">
            <span class="nav-section-title">标签筛选</span>
            <button id="btn-clear-tags" class="btn-text-action hidden">清除选择</button>
          </div>
          <div id="sidebar-tags-list" class="sidebar-tags-list">
            <!-- 标签列表动态加载 -->
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-header">
            <span class="nav-section-title">文件夹目录</span>
            <button id="btn-new-folder" class="btn-text-action">新建文件夹</button>
          </div>
          <div id="sidebar-folders-tree" class="sidebar-folders-tree">
            <!-- 文件夹树动态加载 -->
          </div>
        </div>
      </nav>

      <!-- 侧边栏底部导入导出 -->
      <div class="sidebar-footer">
        <button id="btn-export" class="btn-secondary btn-full">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          备份数据 (JSON)
        </button>
        <button id="btn-import-trigger" class="btn-secondary btn-full">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          导入/恢复数据
        </button>
        <input type="file" id="import-file-input" accept=".json" class="hidden">
      </div>
    </aside>

    <!-- 2. 主内容区 -->
    <main class="main-content">
      <header class="main-header">
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="按书签标题、网址或标签搜索...">
        </div>
        <button id="btn-add-bookmark" class="btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          添加书签
        </button>
      </header>

      <!-- 面包屑导航栏 -->
      <section id="breadcrumbs-bar" class="breadcrumbs-bar hidden">
        <div id="breadcrumbs-list" class="breadcrumbs-list">
          <!-- 面包屑动态加载 -->
        </div>
      </section>

      <!-- 当前筛选状态横条 -->
      <section id="filter-status-bar" class="filter-status-bar hidden">
        <div class="filter-info">
          <span>当前筛选条件:</span>
          <div id="active-filter-chips" class="active-filter-chips"></div>
        </div>
        <button id="btn-reset-filters" class="btn-text-action">重置筛选</button>
      </section>

      <!-- 书签列表卡片区域 -->
      <section class="bookmarks-section">
        <div class="bookmarks-header">
          <h2 id="view-title">所有书签</h2>
          <span id="bookmarks-count" class="count-text">共 0 个书签</span>
        </div>

        <!-- 子文件夹卡片展示区 -->
        <div id="folders-grid" class="folders-grid hidden">
          <!-- 子文件夹卡片动态加载 -->
        </div>

        <div id="bookmarks-grid" class="bookmarks-grid">
          <!-- 书签项动态加载 -->
        </div>

        <div id="bookmarks-empty" class="bookmarks-empty hidden">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="8" y1="12" x2="16" y2="12"></line>
          </svg>
          <h3>未找到任何书签</h3>
          <p>请尝试更改搜索词、在侧边栏切换标签，或点击“添加书签”开始收藏。</p>
        </div>
      </section>
    </main>
  </div>

  <!-- 3. 对话框/模态框 -->
  <!-- 添加/编辑书签模态框 -->
  <div id="bookmark-modal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">添加新书签</h3>
        <button class="btn-close-modal">&times;</button>
      </div>
      <form id="bookmark-form">
        <input type="hidden" id="form-bookmark-id">
        <div class="form-group">
          <label for="form-title">标题</label>
          <input type="text" id="form-title" required placeholder="例如: Google">
        </div>
        <div class="form-group">
          <label for="form-url">网址 (URL)</label>
          <input type="url" id="form-url" required placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label for="form-folder-id">保存位置 (文件夹)</label>
          <select id="form-folder-id" required>
            <!-- 文件夹路径树动态填充 -->
          </select>
        </div>
        <div class="form-group">
          <label>标签 (Tags)</label>
          <div class="modal-tag-input-container">
            <div id="modal-active-tags" class="tag-chips"></div>
            <input type="text" id="modal-tag-input" placeholder="输入标签按回车或逗号添加...">
          </div>
          <!-- 快捷可选的历史标签 -->
          <div class="modal-tag-suggestions">
            <span class="suggestion-label">已有标签(点击快捷添加):</span>
            <div id="modal-suggestion-chips" class="suggestion-chips">
              <!-- 快捷标签动态渲染 -->
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary btn-close-modal">取消</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="manager.js"></script>
</body>
</html>
