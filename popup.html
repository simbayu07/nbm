<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签标签管理器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 头部区域 -->
  <header class="header">
    <div class="logo-container">
      <img src="icons/icon48.png" alt="Logo" class="logo-img">
      <h1 class="logo-text">标签书签</h1>
    </div>
    <button id="btn-open-manager" title="打开完整管理后台">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
    </button>
  </header>

  <main class="main-content">
    <!-- 当前页面收藏区域 -->
    <section class="card current-page-card">
      <div class="card-header">
        <span class="card-title">当前页面</span>
        <button id="btn-toggle-bookmark" class="btn-icon" title="点击收藏/取消收藏">
          <svg id="bookmark-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
      </div>
      
      <div class="page-info">
        <h2 id="page-title" class="page-title-text">正在加载...</h2>
        <p id="page-url" class="page-url-text">正在获取...</p>
      </div>

      <!-- 文件夹选择区 -->
      <div id="folder-section" class="folder-section hidden">
        <label class="section-label">保存位置</label>
        <div class="folder-action-group">
          <div class="select-container">
            <select id="popup-folder-select">
              <!-- 文件夹路径动态加载 -->
            </select>
          </div>
          <button id="btn-popup-new-folder" class="btn-popup-action" title="在选中文件夹下新建子文件夹">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
        
        <div id="popup-new-folder-wrapper" class="popup-new-folder-wrapper hidden">
          <input type="text" id="popup-new-folder-input" placeholder="输入新文件夹名称...">
          <button id="btn-popup-create-folder" class="btn-text-action">创建</button>
          <button id="btn-popup-cancel-folder" class="btn-text-action btn-text-secondary">取消</button>
        </div>
      </div>

      <!-- 标签输入管理区 -->
      <div id="tag-section" class="tag-section hidden">
        <label class="section-label">添加页面标签</label>
        <div class="tag-input-container">
          <div id="active-tags" class="tag-chips"></div>
          <input type="text" id="tag-input" placeholder="输入标签后按回车...">
        </div>
        <!-- 标签推荐/提示 -->
        <div id="tag-suggestions" class="tag-suggestions hidden">
          <span class="suggestion-label">推荐标签:</span>
          <div id="suggestion-list" class="suggestion-chips"></div>
        </div>
      </div>
    </section>

    <!-- 书签搜索与快速列表 -->
    <section class="card search-card">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="通过标签、标题或网址搜索...">
      </div>

      <div class="results-container">
        <div id="results-list" class="results-list"></div>
        <div id="results-empty" class="results-empty">
          <p>输入标签或关键词以开始搜索</p>
        </div>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
